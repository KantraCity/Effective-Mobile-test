version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: subs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d subs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${DB_URL}
      PORT: ${PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: